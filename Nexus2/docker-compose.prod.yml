version: '3.8'

services:
  postgres:
    image: supabase/postgres:15.3.0
    container_name: nexus-postgres-prod
    environment:
      POSTGRES_DB: ${DB_DATABASE:-nexus}
      POSTGRES_USER: ${DB_USERNAME:-nexus}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    networks:
      - nexus-network

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexus-api-prod
    environment:
      DATABASE_URL: postgresql://${DB_USERNAME}:${DB_PASSWORD}@postgres:5432/${DB_DATABASE}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 15m
      API_PORT: 4001
      FRONTEND_URL: ${FRONTEND_URL}
      NODE_ENV: production
      LOG_LEVEL: warn
      N8N_BASE_URL: ${N8N_BASE_URL}
      N8N_WORKFLOW_INGESTION_ID: ${N8N_WORKFLOW_INGESTION_ID}
    volumes:
      - ./backend/storage:/app/storage
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nexus-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${FRONTEND_URL}
    container_name: nexus-frontend-prod
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - nexus-network

volumes:
  postgres_data:

networks:
  nexus-network:
    driver: bridge
